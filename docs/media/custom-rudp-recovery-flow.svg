<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Custom RUDP 복구 흐름</title>
  <desc id="desc">InputCommand 순서 보장, ACK 추적, 재전송, 중복 서버 이벤트 차단을 보여주는 RUDP 흐름도</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 800 46px "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 23px "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif; fill: #475569; }
      .box-title { font: 800 24px "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif; fill: #0f172a; }
      .box-text { font: 500 18px "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif; fill: #475569; }
      .card-title { font: 800 25px "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif; fill: #0f172a; }
      .card-text { font: 500 19px "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif; fill: #475569; }
      .label { font: 800 16px "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif; fill: #334155; }
      .invert-title { font: 800 23px "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif; fill: #ffffff; }
      .invert-text { font: 500 18px "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif; fill: #cbd5e1; }
      .arrow { stroke: #334155; stroke-width: 4; fill: none; marker-end: url(#arrow); }
      .retry { stroke: #e11d48; stroke-width: 4; fill: none; stroke-dasharray: 11 8; marker-end: url(#arrow); }
      .label-bg { fill: #f8fafc; stroke: #e2e8f0; stroke-width: 1; rx: 10; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="#f8fafc"/>
  <text x="70" y="86" class="title">Custom RUDP 복구 흐름</text>
  <text x="72" y="126" class="subtitle">입력 순서 보장, ACK 추적, 재전송, 중복 서버 이벤트 차단을 분리해 구현했습니다.</text>

  <rect x="70" y="220" width="210" height="105" rx="18" fill="#ecfeff" stroke="#06b6d4" stroke-width="4"/>
  <text x="104" y="263" class="box-title">Client</text>
  <text x="104" y="296" class="box-text">InputCommand</text>

  <rect x="370" y="220" width="220" height="105" rx="18" fill="#fff7ed" stroke="#f97316" stroke-width="4"/>
  <text x="404" y="263" class="box-title">UDP Socket</text>
  <text x="404" y="296" class="box-text">datagram 수신</text>

  <rect x="680" y="220" width="220" height="105" rx="18" fill="#eff6ff" stroke="#2563eb" stroke-width="4"/>
  <text x="714" y="263" class="box-title">RUDP Peer</text>
  <text x="714" y="296" class="box-text">session / sequence</text>

  <rect x="990" y="220" width="210" height="105" rx="18" fill="#f0fdf4" stroke="#16a34a" stroke-width="4"/>
  <text x="1024" y="263" class="box-title">Room</text>
  <text x="1024" y="296" class="box-text">권위 상태 적용</text>

  <rect x="1290" y="220" width="240" height="105" rx="18" fill="#fdf4ff" stroke="#a855f7" stroke-width="4"/>
  <text x="1324" y="263" class="box-title">Event Queue</text>
  <text x="1324" y="296" class="box-text">ACK 대기</text>

  <path class="arrow" d="M280 273 H370"/>
  <rect x="302" y="234" width="45" height="28" class="label-bg"/>
  <text x="312" y="254" class="label">seq</text>

  <path class="arrow" d="M590 273 H680"/>
  <rect x="610" y="234" width="48" height="28" class="label-bg"/>
  <text x="620" y="254" class="label">bind</text>

  <path class="arrow" d="M900 273 H990"/>
  <rect x="916" y="234" width="70" height="28" class="label-bg"/>
  <text x="927" y="254" class="label">event</text>

  <path class="arrow" d="M1200 273 H1290"/>
  <rect x="1220" y="234" width="66" height="28" class="label-bg"/>
  <text x="1230" y="254" class="label">eventId</text>

  <rect x="120" y="500" width="360" height="145" rx="22" fill="#ffffff" stroke="#06b6d4" stroke-width="4"/>
  <text x="158" y="550" class="card-title">입력 순서 보장</text>
  <text x="158" y="588" class="card-text">이전/중복 cmdSeq 차단</text>
  <text x="158" y="622" class="card-text">룸 상태는 한 번만 적용</text>

  <rect x="620" y="500" width="360" height="145" rx="22" fill="#ffffff" stroke="#2563eb" stroke-width="4"/>
  <text x="658" y="550" class="card-title">ACK / 재전송</text>
  <text x="658" y="588" class="card-text">pending ACK 메타데이터 보관</text>
  <text x="658" y="622" class="card-text">deadline 초과 시 재전송</text>

  <rect x="1120" y="500" width="360" height="145" rx="22" fill="#ffffff" stroke="#a855f7" stroke-width="4"/>
  <text x="1158" y="550" class="card-title">중복 전달 방지</text>
  <text x="1158" y="588" class="card-text">server event id 추적</text>
  <text x="1158" y="622" class="card-text">같은 event는 한 번만 적용</text>

  <path class="arrow" d="M790 325 V500"/>
  <rect x="812" y="402" width="84" height="30" class="label-bg"/>
  <text x="825" y="423" class="label">ACK 추적</text>

  <path class="arrow" d="M1410 325 V500"/>
  <rect x="1430" y="402" width="84" height="30" class="label-bg"/>
  <text x="1442" y="423" class="label">id 추적</text>

  <path class="retry" d="M800 645 V700 H1410 V645"/>
  <rect x="1020" y="682" width="190" height="32" fill="#f8fafc" stroke="#fecdd3" stroke-width="1" rx="10"/>
  <text x="1038" y="704" class="label" fill="#e11d48">ACK 없으면 재전송</text>

  <rect x="90" y="760" width="1420" height="80" rx="22" fill="#0f172a"/>
  <text x="126" y="808" class="invert-title">현재 범위</text>
  <text x="260" y="808" class="invert-text">프로토콜 계층과 이동 입력/서버 이벤트 신뢰성 검증이 중심입니다. 모든 게임 결과 전송이 RUDP로 완전히 전환됐다는 뜻은 아닙니다.</text>
</svg>
