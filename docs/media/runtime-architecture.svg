<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Loot of Legends 런타임 구조</title>
  <desc id="desc">Unity Client, Spring Meta Server, C++ Game Server, MySQL Redis, 테스트와 부하 검증 스크립트의 관계</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 800 46px "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 23px "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif; fill: #475569; }
      .box-title { font: 800 28px "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif; fill: #0f172a; }
      .box-text { font: 500 20px "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif; fill: #475569; }
      .label { font: 800 17px "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif; fill: #334155; }
      .small { font: 500 18px "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif; fill: #475569; }
      .arrow { stroke: #334155; stroke-width: 4; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1600" height="900" fill="#f8fafc"/>
  <text x="70" y="86" class="title">Loot of Legends 런타임 구조</text>
  <text x="72" y="126" class="subtitle">인증/입장/정산은 Meta Server가 맡고, 게임 중 판정은 C++ Game Server가 소유합니다.</text>

  <rect x="80" y="280" width="300" height="300" rx="22" fill="#ecfeff" stroke="#06b6d4" stroke-width="4"/>
  <text x="112" y="335" class="box-title">Unity Client</text>
  <text x="112" y="382" class="box-text">Google 로그인</text>
  <text x="112" y="418" class="box-text">로비 / 룸 / 전투 UI</text>
  <text x="112" y="454" class="box-text">이동 / 루팅 입력</text>
  <text x="112" y="490" class="box-text">서버 확정 상태 표시</text>

  <rect x="510" y="280" width="420" height="300" rx="22" fill="#eff6ff" stroke="#2563eb" stroke-width="4"/>
  <text x="548" y="335" class="box-title">C++ Game Server</text>
  <text x="548" y="382" class="box-text">TCP/RUDP 세션</text>
  <text x="548" y="418" class="box-text">Room 권위 상태</text>
  <text x="548" y="454" class="box-text">Monster / Drop / Inventory</text>
  <text x="548" y="490" class="box-text">RoomActor 단일 처리</text>

  <rect x="1030" y="280" width="300" height="300" rx="22" fill="#f0fdf4" stroke="#16a34a" stroke-width="4"/>
  <text x="1062" y="335" class="box-title">Spring Meta Server</text>
  <text x="1062" y="382" class="box-text">OAuth 계정</text>
  <text x="1062" y="418" class="box-text">입장 대기열</text>
  <text x="1062" y="454" class="box-text">게임 세션 토큰</text>
  <text x="1062" y="490" class="box-text">정산 API 멱등성</text>

  <rect x="1400" y="320" width="150" height="220" rx="22" fill="#fff7ed" stroke="#f97316" stroke-width="4"/>
  <text x="1426" y="374" class="box-title">DB</text>
  <text x="1426" y="420" class="box-text">MySQL</text>
  <text x="1426" y="456" class="box-text">Redis</text>
  <text x="1426" y="492" class="box-text">정산 guard</text>

  <path class="arrow" d="M380 430 H510"/>
  <text x="415" y="405" class="label">게임 입력</text>

  <path class="arrow" d="M930 430 H1030"/>
  <text x="961" y="405" class="label">정산</text>

  <path class="arrow" d="M1330 430 H1400"/>
  <text x="1352" y="405" class="label">저장</text>

  <path class="arrow" d="M230 280 V210 H1180 V280"/>
  <text x="643" y="195" class="label">로그인 / 입장 요청</text>

  <path class="arrow" d="M1180 580 V660 H230 V580"/>
  <text x="658" y="690" class="label">게임 세션 토큰</text>

  <rect x="160" y="760" width="500" height="70" rx="18" fill="#f1f5f9" stroke="#94a3b8" stroke-width="3"/>
  <text x="194" y="804" class="small">C++ / Meta / Unity 회귀 테스트</text>

  <rect x="940" y="760" width="500" height="70" rx="18" fill="#f1f5f9" stroke="#94a3b8" stroke-width="3"/>
  <text x="974" y="804" class="small">100세션 인계 / 부하 리포트 스크립트</text>
</svg>
