  <text text-anchor="start" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="23" font-weight="400" fill="#4b5563"><tspan x="74" y="142">인증/입장/정산은 Meta Server, 게임 중 권위 판정은 C++ Game Server가 소유합니다.</tspan></text>
