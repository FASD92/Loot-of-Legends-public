  <rect x="72" y="820" width="1456" height="52" rx="8" fill="#f3f4f6"/>
  <text text-anchor="start" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="17" font-weight="400" fill="#4b5563"><tspan x="96" y="854">Client는 입력/표시, C++ Game Server는 Room 권위 상태, Meta Server는 account/session/settlement boundary를 담당합니다.</tspan></text>
