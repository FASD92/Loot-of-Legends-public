<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">서버 권위 루팅 판정 흐름</title>
  <desc id="desc">두 클라이언트의 루팅 요청이 Core Server, Room 단일 처리 경계, 서버 검증을 거쳐 한 명에게만 소유권을 확정하는 흐름도</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 800 46px "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 23px "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif; fill: #475569; }
      .box-title { font: 800 27px "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif; fill: #0f172a; }
      .box-text { font: 500 20px "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif; fill: #475569; }
      .badge { font: 800 18px "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif; fill: #ffffff; }
      .note { font: 700 23px "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif; fill: #ffffff; }
      .small { font: 500 18px "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif; fill: #cbd5e1; }
      .arrow { stroke: #334155; stroke-width: 4; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1600" height="900" fill="#f8fafc"/>
  <text x="70" y="86" class="title">서버 권위 루팅 판정 흐름</text>
  <text x="72" y="126" class="subtitle">클라이언트는 입력 의도만 전송하고, 서버가 Drop 소유권과 Inventory 변경을 최종 확정합니다.</text>

  <rect x="70" y="220" width="260" height="115" rx="18" fill="#ffffff" stroke="#38bdf8" stroke-width="4"/>
  <text x="96" y="267" class="box-title">Client A</text>
  <text x="96" y="303" class="box-text">ClickLoot(dropId)</text>

  <rect x="70" y="430" width="260" height="115" rx="18" fill="#ffffff" stroke="#a78bfa" stroke-width="4"/>
  <text x="96" y="477" class="box-title">Client B</text>
  <text x="96" y="513" class="box-text">ClickLoot(dropId)</text>

  <rect x="470" y="315" width="250" height="145" rx="18" fill="#eff6ff" stroke="#2563eb" stroke-width="4"/>
  <circle cx="508" cy="357" r="20" fill="#2563eb"/>
  <text x="501" y="364" class="badge">1</text>
  <text x="548" y="364" class="box-title">Core::Server</text>
  <text x="508" y="406" class="box-text">패킷 처리</text>
  <text x="508" y="438" class="box-text">세션 / 룸 라우팅</text>

  <rect x="840" y="315" width="270" height="145" rx="18" fill="#f0fdf4" stroke="#16a34a" stroke-width="4"/>
  <circle cx="878" cy="357" r="20" fill="#16a34a"/>
  <text x="871" y="364" class="badge">2</text>
  <text x="918" y="364" class="box-title">Room 단일 처리</text>
  <text x="878" y="406" class="box-text">RoomManager / RoomActor</text>
  <text x="878" y="438" class="box-text">같은 룸 이벤트 순차 적용</text>

  <rect x="1220" y="285" width="300" height="205" rx="18" fill="#fff7ed" stroke="#f97316" stroke-width="4"/>
  <circle cx="1258" cy="327" r="20" fill="#f97316"/>
  <text x="1251" y="334" class="badge">3</text>
  <text x="1298" y="334" class="box-title">서버 검증</text>
  <text x="1258" y="380" class="box-text">룸 소속 확인</text>
  <text x="1258" y="414" class="box-text">Drop 상태 확인</text>
  <text x="1258" y="448" class="box-text">무게 제한 확인</text>

  <rect x="820" y="630" width="300" height="90" rx="16" fill="#fff1f2" stroke="#e11d48" stroke-width="4"/>
  <text x="850" y="670" class="box-title">LootRejected</text>
  <text x="850" y="704" class="box-text">상태 변경 없음</text>

  <rect x="1210" y="630" width="310" height="90" rx="16" fill="#ecfdf5" stroke="#059669" stroke-width="4"/>
  <text x="1240" y="670" class="box-title">LootResolved</text>
  <text x="1240" y="704" class="box-text">소유권 + Inventory 확정</text>

  <path class="arrow" d="M330 278 C390 278 410 355 470 365"/>
  <path class="arrow" d="M330 488 C390 488 410 420 470 410"/>
  <path class="arrow" d="M720 388 H840"/>
  <path class="arrow" d="M1110 388 H1220"/>
  <path class="arrow" d="M1370 490 V630"/>
  <path class="arrow" d="M1300 490 V560 H970 V630"/>

  <rect x="70" y="780" width="1450" height="70" rx="18" fill="#0f172a"/>
  <text x="105" y="824" class="note">불변식</text>
  <text x="215" y="824" class="small">같은 Drop은 한 번만 획득됩니다 · 중복 클릭은 owner를 바꾸지 않습니다 · 무게 초과 루팅은 Drop/Inventory를 변경하지 않습니다</text>
</svg>
