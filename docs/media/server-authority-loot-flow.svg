<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="서버 권위 루팅 판정 흐름">
  <rect width="1600" height="900" fill="#ffffff"/>
  <text text-anchor="start" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="46" font-weight="800" fill="#111827"><tspan x="72" y="98">서버 권위 루팅 판정 흐름</tspan></text>
  <text text-anchor="start" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="23" font-weight="400" fill="#4b5563"><tspan x="74" y="142">클라이언트는 ClickLoot intent만 보내고, 서버가 Drop 소유권과 Inventory 변경을 최종 확정합니다.</tspan></text>
  <rect x="90" y="310" width="230" height="110" rx="10" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text text-anchor="start" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="23" font-weight="700" fill="#111827"><tspan x="118" y="356">Client A</tspan></text>
  <text text-anchor="start" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="17" font-weight="400" fill="#4b5563"><tspan x="118" y="397">ClickLoot(dropId)</tspan></text>
  <rect x="90" y="490" width="230" height="110" rx="10" fill="#ffffff" stroke="#7c3aed" stroke-width="2"/>
  <text text-anchor="start" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="23" font-weight="700" fill="#111827"><tspan x="118" y="536">Client B</tspan></text>
  <text text-anchor="start" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="17" font-weight="400" fill="#4b5563"><tspan x="118" y="577">ClickLoot(dropId)</tspan></text>
  <rect x="470" y="386" width="270" height="160" rx="10" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
  <text text-anchor="start" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="24" font-weight="700" fill="#111827"><tspan x="498" y="434">Core::Server</tspan></text>
  <text text-anchor="start" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="18" font-weight="400" fill="#4b5563"><tspan x="498" y="474">packet 처리</tspan><tspan x="498" dy="28">session / room routing</tspan></text>
  <rect x="835" y="386" width="320" height="160" rx="10" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
  <text text-anchor="start" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="24" font-weight="700" fill="#111827"><tspan x="863" y="434">Room 단일 처리</tspan></text>
  <text text-anchor="start" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="18" font-weight="400" fill="#4b5563"><tspan x="863" y="474">RoomEvent 순차 적용</tspan><tspan x="863" dy="28">같은 Room state 보호</tspan></text>
  <rect x="1240" y="330" width="290" height="250" rx="10" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <text text-anchor="start" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="25" font-weight="700" fill="#111827"><tspan x="1268" y="378">서버 검증</tspan></text>
  <text text-anchor="start" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="20" font-weight="400" fill="#4b5563"><tspan x="1268" y="418">Room membership</tspan><tspan x="1268" dy="31">Drop state</tspan><tspan x="1268" dy="31">Inventory weight</tspan></text>
  <rect x="815" y="660" width="305" height="120" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text text-anchor="start" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="23" font-weight="700" fill="#111827"><tspan x="843" y="706">LootRejected</tspan></text>
  <text text-anchor="start" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="17" font-weight="400" fill="#4b5563"><tspan x="843" y="747">Drop / Inventory 변경 없음</tspan></text>
  <rect x="1218" y="660" width="312" height="120" rx="10" fill="#ecfdf5" stroke="#16a34a" stroke-width="2"/>
  <text text-anchor="start" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="23" font-weight="700" fill="#111827"><tspan x="1246" y="706">LootResolved</tspan></text>
  <text text-anchor="start" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="17" font-weight="400" fill="#4b5563"><tspan x="1246" y="747">소유권 + Inventory 확정</tspan></text>
  <polyline points="320,365 390,365 390,466 470,466" fill="none" stroke="#374151" stroke-width="4" stroke-linecap="square" stroke-linejoin="round"/>
  <polyline points="320,545 390,545 390,466" fill="none" stroke="#374151" stroke-width="4" stroke-linecap="square" stroke-linejoin="round"/>
  <polygon points="444,453 470,466 444,479" fill="#374151"/>
  <line x1="740" y1="466" x2="811" y2="466" stroke="#374151" stroke-width="4" stroke-linecap="square"/>
  <polygon points="809,453 835,466 809,479" fill="#374151"/>
  <line x1="1155" y1="466" x2="1216" y2="466" stroke="#374151" stroke-width="4" stroke-linecap="square"/>
  <polygon points="1214,453 1240,466 1214,479" fill="#374151"/>
  <polyline points="1380,580 1380,620 968,620 968,660" fill="none" stroke="#374151" stroke-width="4" stroke-linecap="square" stroke-linejoin="round"/>
  <polygon points="955,634 981,634 968,660" fill="#374151"/>
  <polyline points="1422,580 1422,620 1374,620 1374,660" fill="none" stroke="#374151" stroke-width="4" stroke-linecap="square" stroke-linejoin="round"/>
  <polygon points="1361,634 1387,634 1374,660" fill="#374151"/>
  <rect x="72" y="801" width="1456" height="52" rx="8" fill="#f3f4f6"/>
  <text text-anchor="start" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="17" font-weight="400" fill="#4b5563"><tspan x="96" y="835">Invariant: 같은 Drop은 한 번만 획득되고, 중복 클릭과 무게 초과 루팅은 Drop/Inventory 상태를 변경하지 않습니다.</tspan></text>
</svg>
