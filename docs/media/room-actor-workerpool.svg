  <text text-anchor="start" font-family="'Noto Sans KR', 'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif" font-size="17" font-weight="400" fill="#4b5563"><tspan x="96" y="835">범위: Room 단위 단일 처리 모델과 WorkerPool 기반 확장 준비입니다. 전체 운영 런타임이 완전한 multi-worker 구조라고 주장하지 않습니다.</tspan></text>
